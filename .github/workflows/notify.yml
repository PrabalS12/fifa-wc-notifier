name: WC Notifier

on:
  schedule:
    - cron: "30 15 * * *"   # 21:00 IST -> preview (tonight's slate)
    - cron: "30 5 * * *"    # 11:00 IST -> recap (last night's results)
  workflow_dispatch:
    inputs:
      mode:
        description: "preview or recap"
        type: choice
        options: [preview, recap]
        default: preview

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - run: uv sync

      - name: Resolve mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "${{ github.event.schedule }}" = "30 5 * * *" ]; then
              echo "value=recap" >> "$GITHUB_OUTPUT"
            else
              echo "value=preview" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "value=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Send notification
        run: uv run python main.py ${{ steps.mode.outputs.value }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          WHATSAPP_TOKEN: ${{ secrets.WHATSAPP_TOKEN }}
          WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          WHATSAPP_RECIPIENT: ${{ secrets.WHATSAPP_RECIPIENT }}
          WHATSAPP_TEMPLATE_NAME: ${{ secrets.WHATSAPP_TEMPLATE_NAME }}
          WHATSAPP_TEMPLATE_LANG: ${{ secrets.WHATSAPP_TEMPLATE_LANG }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
